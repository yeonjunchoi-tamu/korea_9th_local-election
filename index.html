<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2026 시·도지사 개표 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#0a0d13; --bg2:#0e131b; --panel:#121823; --panel2:#161d29;
    --line:#222b3a; --line2:#2c3647;
    --txt:#e7ecf3; --muted:#8a96a6; --muted2:#5f6b7d;
    --accent:#cdd6e3;
    --radius:16px;
    font-synthesis:none;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:'Pretendard',system-ui,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{background:
    radial-gradient(1100px 600px at 80% -10%, rgba(59,116,232,.10), transparent 60%),
    radial-gradient(900px 500px at -5% 10%, rgba(230,80,95,.07), transparent 55%),
    var(--bg);
    min-height:100vh;}
  .tabnum{font-variant-numeric:tabular-nums;}
  b{font-weight:700;}
  .muted{color:var(--muted);}

  .wrap{max-width:1240px;margin:0 auto;padding:26px 24px 60px;}

  /* mode toggle (선거 종류 전환) */
  .mode-toggle{display:inline-flex;gap:5px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:5px;margin:2px 0 20px;}
  .mode-toggle button{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);
    font-family:inherit;font-size:14px;font-weight:700;padding:10px 20px;border-radius:9px;cursor:pointer;letter-spacing:-.01em;
    white-space:nowrap;transition:color .12s, background .12s;}
  .mode-toggle button:hover{color:var(--txt);}
  .mode-toggle button.is-on{background:var(--panel2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.35);}
  .mt-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(242,145,60,.16);color:#f2b27a;letter-spacing:0;}

  /* header */
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;}
  .brand h1{font-size:23px;font-weight:800;margin:0;letter-spacing:-.02em;}
  .brand .sub{color:var(--muted);font-size:13px;margin-top:4px;letter-spacing:-.01em;}
  .demo-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(242,145,60,.12);
    border:1px solid rgba(242,145,60,.32);color:#f2b27a;font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:999px;white-space:nowrap;}
  .demo-pill .dot{width:7px;height:7px;border-radius:50%;background:#f2913c;}
  .demo-pill--ok{background:rgba(73,176,109,.12);border-color:rgba(73,176,109,.32);color:#8fdcab;}
  .demo-pill--ok .dot{background:#49b06d;}

  /* search */
  .search{position:relative;margin:8px 0 22px;}
  .search__icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
  .search__input{width:100%;height:54px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;color:var(--txt);font-size:15.5px;padding:0 46px 0 50px;outline:none;
    transition:border-color .15s, box-shadow .15s;font-family:inherit;}
  .search__input::placeholder{color:var(--muted2);}
  .search__input:focus{border-color:#39507e;box-shadow:0 0 0 4px rgba(59,116,232,.12);}
  .search__clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:var(--muted);cursor:pointer;font-size:14px;padding:6px;}
  .search__menu{position:absolute;left:0;right:0;top:60px;z-index:30;background:var(--panel2);
    border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:0 24px 60px rgba(0,0,0,.55);}
  .search__row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;
    color:var(--txt);padding:10px 12px;border-radius:10px;cursor:pointer;font-family:inherit;}
  .search__row.is-active{background:rgba(255,255,255,.05);}
  .kbadge{flex:0 0 auto;font-size:11px;font-weight:700;width:34px;height:24px;display:flex;align-items:center;
    justify-content:center;border-radius:7px;letter-spacing:-.02em;}
  .k-cand{background:rgba(59,116,232,.16);color:#9cc0ff;}
  .k-region{background:rgba(73,176,109,.16);color:#8fdcab;}
  .k-dong{background:rgba(242,145,60,.16);color:#f2b27a;}
  .search__txt{display:flex;flex-direction:column;min-width:0;}
  .search__label{font-size:14.5px;font-weight:600;}
  .search__sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .search__empty{padding:16px;color:var(--muted);font-size:13.5px;text-align:center;}

  /* layout */
  .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:start;}
  @media(max-width:920px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}

  /* breadcrumb */
  .crumbs{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px;font-size:13.5px;}
  .crumbs button{background:none;border:none;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13.5px;padding:3px 6px;border-radius:6px;}
  .crumbs button:hover{color:var(--txt);background:rgba(255,255,255,.04);}
  .crumbs .cur{color:var(--txt);font-weight:700;padding:3px 6px;}
  .crumbs .sep{color:var(--muted2);}

  /* cartogram */
  .carto__grid{display:grid;gap:7px;width:100%;}
  .tile{position:relative;border:1.5px solid transparent;border-radius:11px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:6px 4px;min-height:0;transition:transform .1s, filter .1s;color:#0c1118;overflow:visible;}
  .tile:hover{transform:translateY(-2px);filter:brightness(1.12);z-index:5;}
  .tile--sel{box-shadow:0 0 0 2px rgba(255,255,255,.18);}
  .tile__name{font-size:13px;font-weight:800;color:#f4f7fb;text-shadow:0 1px 3px rgba(0,0,0,.5);letter-spacing:-.03em;line-height:1.05;text-align:center;}
  .tile__win{font-size:10.5px;font-weight:700;color:rgba(255,255,255,.86);text-shadow:0 1px 2px rgba(0,0,0,.5);}
  .tile__tip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
    background:#0a0e15;border:1px solid var(--line2);border-radius:10px;padding:9px 11px;width:max-content;max-width:220px;
    display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--txt);z-index:20;pointer-events:none;
    box-shadow:0 16px 40px rgba(0,0,0,.6);}
  .tile__tip b{font-size:13px;}
  .tile__tip span{display:flex;align-items:center;gap:6px;}
  .tile__tip .muted{font-size:11px;}

  .carto__cap{text-align:center;color:var(--muted2);font-size:11.5px;margin-top:12px;letter-spacing:-.01em;}

  .legend{display:flex;flex-wrap:wrap;gap:13px;margin-top:16px;padding-top:15px;border-top:1px solid var(--line);
    font-size:12.5px;color:var(--muted);align-items:center;}
  .legend__item{display:inline-flex;align-items:center;gap:6px;}
  .legend__note{margin-left:auto;color:var(--muted2);font-size:11.5px;}

  /* detail */
  .detail__head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px;}
  .detail__head>div:first-child{flex:1 1 auto;min-width:0;}
  .detail__head .btn-ghost{flex:0 0 auto;}
  .detail__type{font-size:11.5px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;}
  .detail__title{font-size:21px;font-weight:800;margin:5px 0 2px;letter-spacing:-.02em;line-height:1.15;}
  .detail__parent{font-size:13px;color:var(--muted);}
  .btn-ghost{background:none;border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:7px 11px;
    font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .btn-ghost:hover{color:var(--txt);border-color:var(--line2);}

  .detail__stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px;}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;}
  .stat__k{font-size:11px;color:var(--muted);margin-bottom:5px;}
  .stat__v{font-size:18px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}

  .detail__sectionlabel{font-size:12px;font-weight:700;color:var(--muted);margin:0 0 11px;letter-spacing:.01em;}

  /* head to head */
  .h2h{margin-bottom:24px;}
  .h2h__top{display:flex;justify-content:space-between;margin-bottom:8px;}
  .h2h__side{display:flex;align-items:center;gap:7px;font-size:13.5px;min-width:0;white-space:nowrap;}
  .h2h__side--r{justify-content:flex-end;}
  .h2h__name{font-weight:700;}
  .h2h__party{color:var(--muted);font-size:12px;}
  .h2h__bar{display:flex;height:34px;border-radius:9px;overflow:hidden;}
  .h2h__seg{display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:800;font-size:13.5px;
    font-variant-numeric:tabular-nums;min-width:42px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .h2h__seg--r{justify-content:flex-end;}
  .h2h__foot{text-align:center;font-size:12.5px;color:var(--muted);margin-top:9px;}
  .h2h__foot b{color:var(--txt);font-variant-numeric:tabular-nums;}

  /* candidate list */
  .cands{display:flex;flex-direction:column;gap:13px;}
  .cand{}
  .cand__row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .cand__rank{width:18px;height:18px;border-radius:5px;background:var(--bg2);border:1px solid var(--line);
    font-size:11px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .cand__name{font-weight:700;font-size:14px;white-space:nowrap;}
  .cand__party{font-size:12px;color:var(--muted);}
  .cand__badge{font-size:10.5px;font-weight:700;color:#9be7b6;background:rgba(73,176,109,.16);
    padding:2px 7px;border-radius:6px;white-space:nowrap;flex:0 0 auto;}
  .cand__badge--local{color:var(--muted);background:rgba(255,255,255,.08);}
  .cand__share{margin-left:auto;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;}
  .cand__track{height:8px;background:var(--bg2);border-radius:5px;overflow:hidden;}
  .cand__fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .cand__votes{font-size:11.5px;color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums;}
  .cand--win .cand__name{}
  .cand--hl{outline:2px solid rgba(59,116,232,.5);outline-offset:6px;border-radius:6px;}

  /* national summary */
  .summarybar{display:flex;height:40px;border-radius:10px;overflow:hidden;margin:6px 0 18px;}
  .summarybar__seg{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;min-width:30px;}
  .summarybar--prop .summarybar__seg{min-width:0;overflow:hidden;}
  .summarybar--prop .summarybar__seg span{white-space:nowrap;padding:0 4px;}
  .summary__cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .summary__card{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;padding:13px 14px;}

  /* 광역의회 의석 구성도 */
  .seatarc{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px 14px 6px;margin:6px 0 14px;}
  .seatlead{margin:0 0 16px;}
  .seatlead__bar{display:flex;height:34px;border-radius:9px;overflow:hidden;}
  .seatlead__on{display:flex;align-items:center;padding-left:14px;color:#fff;font-weight:800;font-size:14px;}
  .seatlead__off{background:var(--panel2);}
  .seattable{border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .seattable__hd,.seattable__row{display:grid;grid-template-columns:1.5fr 1fr 1.1fr 1fr 1fr;align-items:center;}
  .seattable__hd{background:var(--panel2);color:var(--muted);font-size:12px;font-weight:700;}
  .seattable__hd span{padding:11px 8px;text-align:center;}
  .seattable__hd span:first-child{text-align:left;padding-left:16px;}
  .seattable__row{border-top:1px solid var(--line);font-size:14px;font-weight:700;color:var(--txt);}
  .seattable__row span{padding:13px 8px;text-align:center;}
  .seattable__party{text-align:left!important;padding-left:16px!important;}
  .seattable__party b{display:inline-block;padding:4px 9px;border-radius:6px;font-size:12.5px;font-weight:800;}
  .seattable__tot{font-weight:800;}
  .seatnote{font-size:12.5px;color:var(--muted);line-height:1.7;margin:14px 2px 0;}
  .seatnote b{color:var(--txt);}
  .summary__n{font-size:19px;font-weight:800;letter-spacing:-.02em;}
  .summary__p{font-size:12.5px;color:var(--muted);}
  .hint{font-size:13px;color:var(--muted);line-height:1.6;background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;padding:14px;}
  .hint b{color:var(--txt);}

  .chip{font-size:11.5px;padding:3px 9px;border-radius:7px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);}

  /* 사전 vs 본투표 비교 */
  .pdc{margin-bottom:22px;}
  .pdc__rowlabel{display:flex;align-items:baseline;justify-content:space-between;gap:10px;font-size:12.5px;color:var(--muted);margin:0 0 5px;white-space:nowrap;}
  .pdc__rowlabel span:first-child{font-weight:700;color:var(--txt);flex:0 0 auto;}
  .pdc__rowlabel span:last-child{font-size:11.5px;color:var(--muted2);font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis;}
  .pdc__bar{display:flex;height:28px;border-radius:8px;overflow:hidden;margin-bottom:13px;background:var(--bg2);}
  .pdc__seg{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11.5px;
    font-variant-numeric:tabular-nums;min-width:0;white-space:nowrap;transition:width .5s cubic-bezier(.2,.7,.2,1);
    text-shadow:0 1px 2px rgba(0,0,0,.35);}
  .pdc__swings{display:flex;flex-direction:column;gap:7px;margin-top:3px;padding-top:13px;border-top:1px solid var(--line);}
  .pdc__swing{display:flex;align-items:center;gap:9px;font-size:13px;}
  .pdc__sname{font-weight:700;display:flex;align-items:center;gap:7px;min-width:0;white-space:nowrap;}
  .pdc__nums{margin-left:auto;display:flex;align-items:center;gap:9px;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .pdc__arrow{color:var(--muted2);}
  .pdc__delta{font-weight:800;padding:2px 7px;border-radius:6px;font-size:12px;letter-spacing:-.02em;}
  .pdc__delta--up{color:#8fdcab;background:rgba(73,176,109,.15);}
  .pdc__delta--down{color:#f2b27a;background:rgba(242,145,60,.15);}
  .pdc__meta{font-size:11px;color:var(--muted2);margin-top:11px;line-height:1.5;}

  /* layer toggle */
  .sido-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .sido-pills button{background:var(--bg2);border:1px solid var(--line);color:var(--muted);font-family:inherit;white-space:nowrap;
    font-size:13px;font-weight:700;padding:7px 14px;border-radius:9px;cursor:pointer;transition:color .12s, background .12s, border-color .12s;}
  .sido-pills button:hover{color:var(--txt);}
  .sido-pills button.is-on{background:var(--panel2);color:var(--txt);border-color:var(--line2);box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .sido-pills button .pilldot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .sido-pills button .mt-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(73,176,109,.16);color:#8fdcab;margin-left:5px;}
  .na-distgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .na-distcard{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:9px;row-gap:3px;align-items:center;
    background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:12px 13px;cursor:pointer;font-family:inherit;text-align:left;
    transition:border-color .12s, background .12s;}
  .na-distcard:hover{border-color:var(--line2);background:var(--panel2);}
  .na-distcard__dot{grid-row:1 / span 2;width:11px;height:11px;border-radius:50%;}
  .na-distcard__sido{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:-.01em;}
  .na-distcard__name{grid-column:2;font-size:15px;font-weight:800;color:var(--txt);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .na-distcard__cand{grid-column:2;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
  .layer-toggle{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:4px;margin-bottom:14px;}
  .layer-toggle button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:none;border:none;white-space:nowrap;
    color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;padding:9px 8px;border-radius:8px;cursor:pointer;}
  .layer-toggle button:hover{color:var(--txt);}
  .layer-toggle button.is-on{background:var(--panel2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .layer-toggle .rt{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;}
  .layer-toggle button .rt{background:rgba(73,176,109,.16);color:#8fdcab;}
  .layer-toggle button:nth-child(2) .rt{background:rgba(242,145,60,.16);color:#f2b27a;}
  .real-badge{font-size:10px;font-weight:700;color:#8fdcab;background:rgba(73,176,109,.16);border:1px solid rgba(73,176,109,.3);
    padding:2px 7px;border-radius:6px;margin-left:8px;vertical-align:middle;}

  /* geo map */
  .geomap{position:relative;}
  .geomap__svg{width:100%;height:auto;display:block;}
  .geomap__lbl{fill:#f4f7fb;font-weight:800;letter-spacing:-.03em;font-family:'Pretendard',sans-serif;}
  .geomap__tip{position:absolute;transform:translate(-50%,calc(-100% - 14px));background:#0a0e15;border:1px solid var(--line2);
    border-radius:10px;padding:9px 11px;width:max-content;max-width:230px;display:flex;flex-direction:column;gap:3px;
    font-size:12px;color:var(--txt);z-index:20;pointer-events:none;box-shadow:0 16px 40px rgba(0,0,0,.6);}
  .geomap__tip b{font-size:13px;}
  .geomap__tip span{display:flex;align-items:center;gap:6px;}
  .geomap__tip i{width:9px;height:9px;border-radius:2px;display:inline-block;flex:0 0 auto;}
  .geomap__tip .muted{font-size:11px;}

  /* 지역 목록 패널 */
  .rlist{position:absolute;top:6px;right:6px;bottom:30px;width:152px;display:flex;flex-direction:column;max-height:calc(100% - 36px);
    background:rgba(10,13,19,.86);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);border:1px solid var(--line2);
    border-radius:11px;overflow:hidden;z-index:9;box-shadow:0 12px 34px rgba(0,0,0,.5);}
  .rlist--collapsed{bottom:auto;max-height:none;}
  .rlist__hd{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:7px 10px;flex:0 0 auto;white-space:nowrap;
    font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;border-bottom:1px solid var(--line);}
  .rlist--collapsed .rlist__hd{border-bottom:none;}
  .rlist__hd .cnt{color:var(--muted2);font-weight:600;}
  .rlist__hd .car{transition:transform .15s;}
  .rlist--collapsed .rlist__hd .car{transform:rotate(-90deg);}
  .rlist__body{overflow-y:auto;padding:4px;flex:1 1 auto;}
  .rlist--collapsed .rlist__body{display:none;}
  .rlist__row{display:flex;align-items:center;gap:7px;width:100%;text-align:left;background:none;border:none;
    color:var(--txt);padding:5px 6px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;line-height:1.2;}
  .rlist__row:hover,.rlist__row.is-hot{background:rgba(255,255,255,.07);}
  .rlist__row i{width:9px;height:9px;border-radius:2px;flex:0 0 auto;}
  .rlist__nm{flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em;}
  .rlist__pc{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .rlist__body::-webkit-scrollbar{width:7px;}
  .rlist__body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px;}

  .footer b{color:var(--muted);}

<body style="font-size: 16px">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">

(function () {
  const { useState } = React;
  const { SearchBar, RegionMap, Legend, Detail, NationalSummary, GuSummary, GukSummary, EduSummary, NaSummary, PartyDot, pathCenter } = window.UI;
  const { byKey, sidoList } = DATA;
  const KGEO = window.KOREA_GEO;

  /* 시·도 경계(전국 지도) + 중심점 */
  const kgeoById = {};
  KGEO.sido.forEach((s) => {const [cx, cy] = pathCenter(s.path);kgeoById[s.id] = { ...s, cx, cy };});

  const sidoC = (id) => byKey['sido-' + id];

  /* path d 문자열의 bbox */
  function bboxOf(d) {
    const n = d.match(/-?[\d.]+/g);if (!n) return null;
    let a = 1e9,b = 1e9,c = -1e9,e = -1e9;
    for (let i = 0; i < n.length; i += 2) {const x = +n[i],y = +n[i + 1];if (x < a) a = x;if (x > c) c = x;if (y < b) b = y;if (y > e) e = y;}
    return [a, b, c, e];
  }
  /* path d 의 모든 좌표쌍에 scale+translate 적용 (M/L/Z 절대좌표 전용) */
  function transformPath(d, s, tx, ty) {
    let i = 0;
    return d.replace(/-?[\d.]+/g, (m) => {const v = parseFloat(m);const out = i % 2 === 0 ? v * s + tx : v * s + ty;i++;return out.toFixed(1);});
  }

  /* ── 전국 지도: 시·도별 1위 정당 색으로 통일(단색). 내부 세부 경계는 숨김. ── */

  /* 전국 라벨 미세 보정(전국 viewBox 좌표, +x=오른쪽 / +y=아래) */
  const LABEL_NUDGE = {
    '41': [6, 18], // 경기 — 서울과 겹치지 않게 더 아래로
    '28': [-8, -6], // 인천 — 서울·경기에서 살짝 떨어뜨림
    '11': [0, -2], // 서울
    '44': [-15, 0], // 충남 — 살짝 왼쪽으로
    '49': [4, -6], // 전남·광주 — 본토 중앙 쪽으로
    '47': [44, -60] // 경북 — 중앙에서 오른쪽 위로
  };

  /* ============================================================================
     전국 읍·면·동 모자이크 (DONG_GEO · 행정안전부 2026.04 행정동)
     ----------------------------------------------------------------------------
     모든 시·도가 하나의 좌표계에 투영돼 빈틈 없이 맞물린다. 각 동을 선거결과에
     이름으로 매칭해 1위 정당/성향 색으로 칠하고, 시·도(선거구) 경계선을 덧그린다.
     ========================================================================== */
  const DG = window.DONG_GEO;
  const ELEC_SHORT = { '11': '서울', '26': '부산', '27': '대구', '28': '인천', '29': '광주', '30': '대전', '31': '울산', '36': '세종', '41': '경기', '42': '강원', '43': '충북', '44': '충남', '45': '전북', '46': '전남', '47': '경북', '48': '경남', '49': '전남·광주', '50': '제주', '51': '강원', '52': '전북' };
  const xwalk = DATA.mosaic ? DATA.mosaic.xwalk : (s) => s;

  /* 전국 지도 툴팁 = 해당 시·도 단위 결과(읍·면·동이 아니라). 색칠은 그대로 읍·면·동별. */
  const govTip = (es) => {const c = DATA.byKey['sido-' + es];return c ? { result: c, tipName: c.regionName } : null;};
  const eduTip = (es) => {const c = DATA.edu && DATA.edu.byKey['edusido-' + es];return c ? { result: c, tipName: c.regionName } : null;};
  const gukDom = {};
  if (DATA.guk) DATA.guk.sidoList.forEach((se) => {
    const cnt = {};se.districts.forEach((d) => {cnt[d.winnerPartyId] = (cnt[d.winnerPartyId] || 0) + 1;});
    let best = 'indep',bn = 0;for (const p in cnt) {if (cnt[p] > bn) {bn = cnt[p];best = p;}}
    gukDom[se.id] = { result: { winnerPartyId: best, novote: false, aggInfo: { pid: best, seats: bn, total: se.districts.length } }, tipName: se.name };
  });
  const gukTip = (es) => gukDom[es] || null;

  /* 국회의원 재·보궐: 시·도별 최다 당선 정당(전국 지도 툴팁용) */
  const naDom = {};
  if (DATA.na) DATA.na.sidoList.forEach((se) => {
    const cnt = {};se.districts.forEach((d) => {cnt[d.winnerPartyId] = (cnt[d.winnerPartyId] || 0) + 1;});
    let best = 'indep',bn = 0;for (const p in cnt) {if (cnt[p] > bn) {bn = cnt[p];best = p;}}
    naDom[se.id] = { result: { winnerPartyId: best, novote: false, aggInfo: { pid: best, seats: bn, total: se.districts.length } }, tipName: se.name };
  });
  const naTip = (es) => naDom[es] || null;

  /* which: 'gov'|'guk'|'edu' · bk: 데이터셋 byKey · hasSido(es) · sidoTip(es)→{result,tipName} */
  function buildMosaic(which, bk, hasSido, sidoTip) {
    const regions = [],outlines = [],labels = [];const ps = new Set();
    if (!DG) return { regions, outlines, labels, parties: [] };
    Object.keys(DG.sido).forEach((adm) => {
      const es = xwalk(adm);
      const tip = sidoTip ? sidoTip(es) : null;
      DG.sido[adm].dongs.forEach((dn) => {
        const rec = DATA.mosaicLookup ? DATA.mosaicLookup(which, adm, dn.sg, dn.nm) : null;
        let result = null;
        if (rec) {const c = bk[rec.key];result = c || { winnerPartyId: rec.pid, marginPct: rec.margin, novote: !!rec.novote };ps.add(rec.pid);}
        regions.push({ key: which + '-' + adm + '-' + dn.cd, gid: es, path: dn.d, result,
          tip: tip ? tip.result : null,
          tipName: tip ? tip.tipName : (dn.sg ? dn.sg + ' ' : '') + dn.nm });
      });
    });
    Object.keys(DG.outline).forEach((es) => {
      if (hasSido && !hasSido(es)) return; // 데이터 없는 시·도는 경계선 생략(회색 메시만)
      outlines.push({ gid: es, pid: 'indep', path: DG.outline[es] });
      if (DG.label[es]) labels.push({ cx: DG.label[es][0], cy: DG.label[es][1], text: ELEC_SHORT[es] || es });
    });
    return { regions, outlines, labels, parties: [...ps] };
  }

  /* 데이터 없는(회색) 시·도 경계 — 옅게 깔아 위치만 알려줌 */
  function greyOutlines(hasSido) {
    if (!DG) return [];
    return Object.keys(DG.outline).filter((es) => !hasSido(es)).map((es) => ({ key: 'g' + es, path: DG.outline[es], fill: 'none', stroke: 'rgba(120,134,156,.20)', sw: 1.4 }));
  }
  function greyLabels(hasSido) {
    if (!DG) return [];
    return Object.keys(DG.label).filter((es) => !hasSido(es)).map((es) => ({ cx: DG.label[es][0], cy: DG.label[es][1], text: ELEC_SHORT[es] || es, dim: true }));
  }

  const MOSAIC = {
    gov: buildMosaic('gov', DATA.byKey, null, govTip),
    guk: DATA.guk ? buildMosaic('guk', DATA.guk.byKey, (es) => DATA.guk.byKey['guk-' + es + '-0'] != null, gukTip) : null,
    edu: DATA.edu ? buildMosaic('edu', DATA.edu.byKey, (es) => DATA.edu.byKey['edusido-' + es] != null, eduTip) : null,
    na: DATA.na ? buildMosaic('na', DATA.na.byKey, (es) => DATA.na.byKey['na-' + es + '-0'] != null, naTip) : null
  };
  const NAT_VB = DG ? '0 0 ' + DG.vb[0] + ' ' + DG.vb[1] : '0 0 ' + KGEO.viewBox[0] + ' ' + KGEO.viewBox[1];
  const NAT_FONT = DG ? +(DG.vb[0] / 120).toFixed(2) : 8;
  const NAT_LBLFONT = DG ? +(DG.vb[0] / 56).toFixed(2) : 15;

  function GovExplorer() {
    const [nav, setNav] = useState({ level: 'national', sidoId: null, sgIndex: null });
    const [sel, setSel] = useState({ contestKey: null, highlight: null });

    const goNational = () => {setNav({ level: 'national', sidoId: null, sgIndex: null });setSel({ contestKey: null, highlight: null });};
    const goSido = (id) => {setNav({ level: 'sido', sidoId: id, sgIndex: null });setSel({ contestKey: 'sido-' + id, highlight: null });};
    const goSigungu = (id, sgi) => {setNav({ level: 'sigungu', sidoId: id, sgIndex: sgi });setSel({ contestKey: 'sg-' + id + '-' + sgi, highlight: null });};
    const selectDong = (key, hl = null) => {setSel({ contestKey: key, highlight: hl });};

    /* ---- 검색 결과 분기 ---- */
    const onPick = (item) => {
      const single = sidoC(item.sidoId) && sidoC(item.sidoId).single;
      if (item.kind === 'region') {
        if (item.level === 'sido') goSido(item.sidoId);else
        goSigungu(item.sidoId, item.sgIndex);
      } else if (item.kind === 'dong') {
        if (single) {setNav({ level: 'sido', sidoId: item.sidoId, sgIndex: null });} else
        {setNav({ level: 'sigungu', sidoId: item.sidoId, sgIndex: item.sgIndex });}
        setSel({ contestKey: item.contestKey, highlight: null });
      } else if (item.kind === 'candidate') {
        const k = item.contestKey;
        if (k.indexOf('sido-') === 0) {setNav({ level: 'sido', sidoId: item.sidoId, sgIndex: null });setSel({ contestKey: k, highlight: item.candName });} else
        if (k.indexOf('sg-') === 0) {setNav({ level: 'sigungu', sidoId: item.sidoId, sgIndex: item.sgIndex });setSel({ contestKey: k, highlight: item.candName });} else
        {// dong
          if (single) setNav({ level: 'sido', sidoId: item.sidoId, sgIndex: null });else
          setNav({ level: 'sigungu', sidoId: item.sidoId, sgIndex: item.sgIndex });
          setSel({ contestKey: k, highlight: item.candName });
        }
      }
    };

    const contest = sel.contestKey ? byKey[sel.contestKey] : null;

    /* ---- 지도 구성 ---- */
    let regions = [],labels = null,viewBox = '0 0 1000 938',selectedGid = null,fontSize = 8,labelFont = 15,flat = false,caption = '',outlines = null,list = null,staticMosaic = false;
    let legendParties = ['minju', 'power', 'jokuk', 'reform', 'jinbo', 'indep'];

    const sidoSet = () => {const set = new Set();sidoList.forEach((s) => set.add(sidoC(s.id).winnerPartyId));return set;};

    if (nav.level === 'national') {
      flat = true;fontSize = NAT_FONT;labelFont = NAT_LBLFONT;
      viewBox = NAT_VB;
      regions = MOSAIC.gov.regions;
      outlines = MOSAIC.gov.outlines;
      staticMosaic = true;
      labels = MOSAIC.gov.labels;
      selectedGid = contest && contest.level === 'sido' ? contest.sidoId : null;
      caption = '전국 읍·면·동별 1위 정당 · 실제 개표 데이터(중앙선관위) · 채도 = 격차';
      legendParties = MOSAIC.gov.parties;
      list = { title: '시·도', items: sidoList.map((s) => {const c = sidoC(s.id);return { key: s.id, gid: s.id, label: c.regionName, pid: c.winnerPartyId, share: c.candidates[0].share, on: () => goSido(s.id) };}).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
    } else {
      const sc = sidoC(nav.sidoId);
      const single = sc.single;
      if (nav.level === 'sido' && !single) {
        /* 시·군·구로 묶되, 칠은 읍·면·동별 1위 → 클릭 시 시·군·구로 */
        viewBox = '0 0 ' + sc.vb[0] + ' ' + sc.vb[1];
        fontSize = +(sc.vb[0] / 220).toFixed(3);labelFont = +(sc.vb[0] / 52).toFixed(2);
        sc.sigungu.forEach((sg, sgi) => {sg.dongs.forEach((d) => {if (d.geo) regions.push({ key: d.key, gid: 'sg' + sgi, path: d.geo.d, result: sg, fillRes: d, tipName: sg.regionName });});});
        labels = sc.sigungu.filter((sg) => sg.geo).map((sg) => ({ cx: sg.geo.cx, cy: sg.geo.cy, text: sg.sggName }));
        caption = sc.regionName + ' · 읍·면·동별 1위 정당 · 클릭하면 시·군·구별 개표로';
        const ps = new Set();sc.sigungu.forEach((sg) => sg.dongs.forEach((d) => {if (d.geo) ps.add(d.winnerPartyId);}));legendParties = [...ps];
        list = { title: '시·군·구', items: sc.sigungu.map((sg, sgi) => ({ key: 'sg' + sgi, gid: 'sg' + sgi, label: sg.sggName, pid: sg.winnerPartyId, share: sg.candidates[0].share, on: () => goSigungu(nav.sidoId, sgi) })).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      } else {
        /* 읍·면·동 단위 (sigungu 화면, 또는 세종 같은 단층 시·도) */
        const sg = single ? sc.sigungu[0] : sc.sigungu[nav.sgIndex];
        if (single) {viewBox = '0 0 ' + sc.vb[0] + ' ' + sc.vb[1];labelFont = +(sc.vb[0] / 40).toFixed(2);fontSize = +(sc.vb[0] / 220).toFixed(3);} else
        {
          const bb = sg.geo ? sg.geo.bbox : [0, 0, sc.vb[0], sc.vb[1]];
          const pad = Math.max(bb[2] - bb[0], bb[3] - bb[1]) * 0.04 + 2;
          const w = bb[2] - bb[0] + 2 * pad,h = bb[3] - bb[1] + 2 * pad;
          viewBox = (bb[0] - pad).toFixed(1) + ' ' + (bb[1] - pad).toFixed(1) + ' ' + w.toFixed(1) + ' ' + h.toFixed(1);
          labelFont = +(w / 30).toFixed(2);fontSize = +(w / 180).toFixed(3);
        }
        sg.dongs.forEach((d) => {if (d.geo) regions.push({ key: d.key, gid: d.key, path: d.geo.d, result: d, tipName: d.dongName });});
        labels = sg.dongs.filter((d) => d.geo).map((d) => ({ cx: d.geo.cx, cy: d.geo.cy, text: d.dongName }));
        selectedGid = contest && contest.level === 'dong' ? contest.key : null;
        caption = (single ? sc.regionName : sc.regionName + ' ' + sg.sggName) + ' · 읍·면·동별 1위 · 채도 = 격차';
        const ps = new Set();sg.dongs.forEach((d) => ps.add(d.winnerPartyId));legendParties = [...ps];
        list = { title: '읍·면·동', items: sg.dongs.map((d) => ({ key: d.key, gid: d.key, label: d.dongName, pid: d.winnerPartyId, share: d.candidates[0].share, on: () => selectDong(d.key) })).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      }
    }

    const onSelect = (r) => {
      if (nav.level === 'national') {if (sidoC(r.gid)) goSido(r.gid);} else
      if (nav.level === 'sido' && !sidoC(nav.sidoId).single) {const sgi = +r.gid.slice(2);goSigungu(nav.sidoId, sgi);} else
      selectDong(r.key);
    };

    /* ---- 상세 패널 back ---- */
    let back = null,backLabel = '';
    if (contest) {
      if (contest.level === 'dong') {
        const sc2 = sidoC(contest.sidoId);
        if (sc2.single) {back = () => {setNav({ level: 'sido', sidoId: contest.sidoId, sgIndex: null });setSel({ contestKey: 'sido-' + contest.sidoId, highlight: null });};backLabel = sc2.regionName;} else
        {back = () => goSigungu(contest.sidoId, contest.sgIndex);backLabel = sc2.sigungu[contest.sgIndex].sggName;}
      } else if (contest.level === 'sigungu') {back = () => goSido(contest.sidoId);backLabel = sidoC(contest.sidoId).regionName;} else
      if (contest.level === 'sido') {back = goNational;backLabel = '전국';}
    }

    /* ---- breadcrumb ---- */
    const cur = nav.sidoId != null ? sidoC(nav.sidoId) : null;
    const dongSel = contest && contest.level === 'dong' ? contest : null;
    const sgName = nav.level === 'sigungu' && cur && !cur.single ? cur.sigungu[nav.sgIndex].sggName :
    dongSel && !sidoC(dongSel.sidoId).single ? sidoC(dongSel.sidoId).sigungu[dongSel.sgIndex].sggName : null;

    return <>
      <SearchBar onPick={onPick} />

      <div className="grid">
        <div className="card">
          <div className="crumbs">
            <button onClick={goNational}>대한민국</button>
            {cur && <><span className="sep">›</span>{nav.level === 'sido' && !dongSel ? <span className="cur">{cur.regionName}</span> : <button onClick={() => goSido(nav.sidoId)}>{cur.regionName}</button>}</>}
            {sgName && <><span className="sep">›</span>{dongSel ? <button onClick={() => goSigungu(nav.sidoId, dongSel.sgIndex)}>{sgName}</button> : <span className="cur">{sgName}</span>}</>}
            {dongSel && <><span className="sep">›</span><span className="cur">{dongSel.dongName}</span></>}
          </div>
          <RegionMap regions={regions} labels={labels} viewBox={viewBox} onSelect={onSelect}
          selectedGid={selectedGid} fontSize={fontSize} labelFont={labelFont} flat={flat} label={caption} outlines={outlines} list={list} staticMosaic={staticMosaic} />
          <Legend parties={legendParties} />
        </div>

        <div className="card">
          {contest ?
          <Detail contest={contest} highlightName={sel.highlight} onBack={back} backLabel={backLabel}
          hint={contest.level === 'sido' ? '지도에서 시·군·구를 클릭하면 읍·면·동까지 들어갈 수 있어요.' : contest.level === 'sigungu' ? '지도에서 읍·면·동을 클릭하면 동별 개표 결과를 볼 수 있어요.' : null} /> :
          <NationalSummary />}
        </div>
      </div>

      <div className="footer">
        <b>데이터</b> — 중앙선관위 <b>시·도지사 선거 읍·면·동별 개표 엑셀</b>을 그대로 집계했습니다. 광역(시·도) → 시·군·구 → 읍·면·동 3단계 모두 실제 수치입니다.<br />
        <b>전남·광주통합특별시</b>는 광주광역시 5개 자치구 + 전라남도 22개 시·군을 통합했습니다. 세종특별자치시는 시·군·구가 없어 시 → 읍·면·동 2단계입니다.<br />
        행정구역 경계: 행정안전부 행정동 경계 2026.04.01 기준.
      </div>
  </>;
  }

  /* ====================== 서울 구청장(시·군·구의장) 탐색기 ====================== */
  function GuExplorer() {
    const GU = DATA.gu;
    const guC = (gi) => GU.byKey['gu-' + gi];
    const [nav, setNav] = useState({ level: 'overview', guIdx: null });
    const [sel, setSel] = useState({ contestKey: null, highlight: null });

    const goOverview = () => {setNav({ level: 'overview', guIdx: null });setSel({ contestKey: null, highlight: null });};
    const goGu = (gi) => {setNav({ level: 'gu', guIdx: gi });setSel({ contestKey: 'gu-' + gi, highlight: null });};
    const selectDong = (key, hl = null) => {setSel({ contestKey: key, highlight: hl });};

    const onPick = (item) => {
      if (item.kind === 'region') {goGu(item.guIndex);} else
      if (item.kind === 'dong') {setNav({ level: 'gu', guIdx: item.guIndex });setSel({ contestKey: item.contestKey, highlight: null });} else
      if (item.kind === 'candidate') {setNav({ level: 'gu', guIdx: item.guIndex });setSel({ contestKey: item.contestKey, highlight: item.candName });}
    };

    const contest = sel.contestKey ? GU.byKey[sel.contestKey] : null;
    const vb = GU.seoulVb;
    let regions = [],labels = null,viewBox = '0 0 ' + vb[0] + ' ' + vb[1],selectedGid = null;

  /* 반원형 의석 배치도 — total석을 정당 순서(GW_ORDER)대로 좌→우 채움 */
  function SeatArc({ seatComp, total }) {
    const seq = []; seatComp.forEach((c) => { for (let i = 0; i < c.total; i++) seq.push(c.pid); });
    while (seq.length < total) seq.push('etc');
    const rows = total <= 24 ? 3 : total <= 60 ? 4 : total <= 100 ? 5 : 6;
    const rIn = 0.62, rOut = 1.0;
    const radii = []; for (let i = 0; i < rows; i++) radii.push(rIn + (rOut - rIn) * (rows === 1 ? 0 : i / (rows - 1)));
    const wsum = radii.reduce((a, b) => a + b, 0);
    let counts = radii.map((r) => Math.max(1, Math.round(total * r / wsum)));
    let diff = total - counts.reduce((a, b) => a + b, 0); let gi = rows - 1;
    while (diff !== 0) { counts[gi] += diff > 0 ? 1 : -1; diff += diff > 0 ? -1 : 1; gi = (gi - 1 + rows) % rows; }
    const seats = [];
    radii.forEach((r, ri) => { const n = counts[ri]; for (let k = 0; k < n; k++) { const t = n === 1 ? 0.5 : k / (n - 1); seats.push({ r, th: Math.PI * (1 - t) }); } });
    seats.sort((a, b) => b.th - a.th);
    const W = 340, R = 150, cx = W / 2, cy = R + 6, dot = 7.4;
    return (
      <svg viewBox={`0 0 ${W} ${cy + 20}`} style={{ width: '100%', display: 'block' }}>
        {seats.map((s, i) => { const x = cx + R * s.r * Math.cos(s.th), y = cy - R * s.r * Math.sin(s.th); const pid = seq[i] || 'etc';
          return <circle key={i} cx={x.toFixed(1)} cy={y.toFixed(1)} r={dot} fill={party(pid).color} />; })}
        <text x={cx} y={cy - 6} textAnchor="middle" style={{ fontSize: 56, fontWeight: 800, fill: 'var(--txt)', fontFamily: 'inherit' }}>{total}</text>
        <text x={cx} y={cy + 13} textAnchor="middle" style={{ fontSize: 14, fill: 'var(--muted)' }}>▼</text>
      </svg>
    );
  }

            <button key={dc.key} className="cand" style={{ background: 'none', border: 'none', textAlign: 'left', padding: 0, cursor: 'pointer', fontFamily: 'inherit', color: 'inherit' }} onClick={() => onDist(gi, dc.sgIndex)}>
              <div className="cand__row"><PartyDot pid={dc.winnerPartyId} size={11} /><span className="cand__name">{multi ? ws.map((w) => w.name).join(', ') : dc.candidates[0].name}</span><span className="cand__party">{dc.sggName.replace(gu.name, '')}{multi ? ' · ' + ws.length + '인' : ''}</span><span className="cand__share">{dc.novote ? '무투표' : multi ? ws.length + '명 당선' : pct(dc.candidates[0].share)}</span></div>
              <div className="cand__track" style={multi ? { display: 'flex', gap: 2 } : null}>{multi ? ws.map((w, wi) => <div key={wi} style={{ flex: 1, height: '100%', borderRadius: 5, background: party(w.partyId).color }} />) : <div className="cand__fill" style={{ width: (dc.novote ? 100 : dc.candidates[0].share * 100) + '%', background: party(dc.winnerPartyId).color, opacity: dc.novote ? 0.5 : 1 }} />}</div>
              <div className="cand__votes">{multi ? ws.map((w) => party(w.partyId).short).join(' · ') + ' 당선' : party(dc.winnerPartyId).name + ' · ' + (dc.novote ? '무투표 당선' : '격차 ' + pct(dc.marginPct) + 'p')}</div>
            </button>
          ); })}
        </div>
        {seatSegs.length > 0 && <>
          <div className="detail__sectionlabel">자치구 의석 분포</div>
          <div className="summarybar" style={{ marginBottom: 18 }}>{seatSegs.map((p) => <div key={p} className="summarybar__seg" style={{ flex: seatCnt[p], background: party(p).color }}><span>{party(p).short} {seatCnt[p]}</span></div>)}</div>
        </>}
        {pc && <>
          <div className="detail__sectionlabel">비례대표 정당 득표 · {gu.name}</div>
          <div className="cands">
            {propTop.map((c) => (
              <div key={c.partyId} className="cand"><div className="cand__row"><PartyDot pid={c.partyId} size={11} /><span className="cand__name">{c.name}</span><span className="cand__share">{pct(c.share)}</span></div>
                <div className="cand__track"><div className="cand__fill" style={{ width: (c.share * 100) + '%', background: party(c.partyId).color }} /></div>
                <div className="cand__votes">{fmt(c.votes)}표</div></div>
            ))}
          </div>
        </>}
        <p className="hint" style={{ marginTop: 16 }}>위 <b>당선자</b>를 누르거나 지도에서 <b>선거구</b>를 클릭하면 읍·면·동별 개표로 들어갑니다.</p>
      </div>
    );
  }

  /* ====================== 광역의회의원(시·도의회) 탐색기 ====================== */
  const SIDO_NICK_GW = { '충청북도': '충북', '충청남도': '충남', '경상북도': '경북', '경상남도': '경남', '전라북도': '전북', '전라남도': '전남', '전북특별자치도': '전북' };
  const sidoShort = (nm) => SIDO_NICK_GW[nm] || nm.replace(/(통합특별시|특별자치시|특별자치도|특별시|광역시|특별자치|자치도)$/, '').replace(/도$/, '');
  function GwangExplorer() {
    const SIDOS = DATA.gwang.order;
    const [sidoCode, setSidoCode] = useState(SIDOS[0]);
    const G = DATA.gwang.sido[sidoCode];
    const singleGu = G.guList.length === 1;
    const guC = (gi) => G.guList[gi];
    const distC = (gi, di) => G.byKey['gwdist-' + gi + '-' + di];
    const propC = (gi) => G.byKey['gwprop-' + gi];

    const [layer, setLayer] = useState('dist');
    const [nav, setNav] = useState({ level: 'seoul', guIdx: null, sgIdx: null });
    const [sel, setSel] = useState({ contestKey: null, highlight: null });

    const reset = (lyr) => { setLayer(lyr); setNav({ level: 'seoul', guIdx: null, sgIdx: null }); setSel({ contestKey: null, highlight: null }); };
    const switchSido = (code) => { setSidoCode(code); setLayer('dist'); setNav({ level: 'seoul', guIdx: null, sgIdx: null }); setSel({ contestKey: null, highlight: null }); };
    const goSeoul = () => { setNav({ level: 'seoul', guIdx: null, sgIdx: null }); setSel({ contestKey: null, highlight: null }); };
    const goGu = (gi) => { if (layer === 'prop') { setNav({ level: 'gu', guIdx: gi, sgIdx: null }); setSel({ contestKey: 'gwprop-' + gi, highlight: null }); } else { setNav({ level: 'gu', guIdx: gi, sgIdx: null }); setSel({ contestKey: null, highlight: null }); } };
    const goDist = (gi, di) => { setNav({ level: 'dist', guIdx: gi, sgIdx: di }); setSel({ contestKey: 'gwdist-' + gi + '-' + di, highlight: null }); };
    const selectDong = (key, hl = null) => { setSel({ contestKey: key, highlight: hl }); };

    const onPick = (item) => {
      if (item.kind === 'region') {
        if (item.level === 'gu') { setLayer('dist'); goGu(item.guIndex); }
        else if (item.level === 'gwdist') { setLayer('dist'); goDist(item.guIndex, item.sgIndex); }
        else if (item.level === 'gwprop') { setLayer('prop'); setNav({ level: 'gu', guIdx: item.guIndex, sgIdx: null }); setSel({ contestKey: item.contestKey, highlight: null }); }
      } else if (item.kind === 'dong') { setLayer('dist'); setNav({ level: 'dist', guIdx: item.guIndex, sgIdx: item.sgIndex }); setSel({ contestKey: item.contestKey, highlight: null }); }
      else if (item.kind === 'candidate') { setLayer('dist'); setNav({ level: 'dist', guIdx: item.guIndex, sgIdx: item.sgIndex }); setSel({ contestKey: item.contestKey, highlight: item.candName }); }
    };

    const contest = sel.contestKey ? G.byKey[sel.contestKey] : null;
    const vb = G.vb;
    let regions = [], labels = null, viewBox = '0 0 ' + vb[0] + ' ' + vb[1], selectedGid = null;
    let fontSize = +(vb[0] / 220).toFixed(3), labelFont = +(vb[0] / 52).toFixed(2), caption = '', list = null, legendParties = [];

    const guDistDom = (gi) => { const gu = guC(gi); const cnt = {}; gu.districts.forEach((d) => { const w = distC(gi, d.sgIndex).winnerPartyId; cnt[w] = (cnt[w] || 0) + 1; }); let best = 'indep', bn = 0; for (const p in cnt) { if (cnt[p] > bn) { bn = cnt[p]; best = p; } } return { pid: best, share: gu.districts.length ? bn / gu.districts.length : 0 }; };
    const shortDist = (nm, guName) => { const s = nm.replace(guName, ''); const m = s.match(/(\d+)\s*선거구/); return m ? m[1] + '선거구' : s; };

    if (layer === 'dist') {
      if (nav.level === 'seoul' && !singleGu) {
        G.guList.forEach((gu) => gu.districts.forEach((d) => { const dc = distC(gu.guIndex, d.sgIndex); dc.dongs.forEach((dn) => { if (dn.geo) regions.push({ key: dn.key, gid: 'gu' + gu.guIndex, path: dn.geo.d, result: dc, fillRes: dn, tipName: gu.name + ' ' + dc.sggName }); }); }));
        labels = G.guList.filter((gu) => gu.geo).map((gu) => ({ cx: gu.geo.cx, cy: gu.geo.cy, text: gu.name }));
        selectedGid = contest && contest.guIndex != null ? 'gu' + contest.guIndex : null;
        caption = G.name + ' 광역의원 지역구 — 읍·면·동별 1위 정당 · 채도 = 격차 · 자치구를 클릭하면 선거구 → 읍·면·동으로';
        const ps = new Set(); G.guList.forEach((gu) => gu.districts.forEach((d) => distC(gu.guIndex, d.sgIndex).dongs.forEach((dn) => { if (dn.geo) ps.add(dn.winnerPartyId); }))); legendParties = [...ps];
        list = { title: '자치구', items: G.guList.map((gu) => { const dm = guDistDom(gu.guIndex); return { key: 'gu' + gu.guIndex, gid: 'gu' + gu.guIndex, label: gu.name, pid: dm.pid, share: dm.share, on: () => goGu(gu.guIndex) }; }).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      } else if (nav.level === 'gu' || (nav.level === 'seoul' && singleGu)) {
        const gIdx = singleGu ? 0 : nav.guIdx;
        const gu = guC(gIdx);
        const bb = gu.geo ? gu.geo.bbox : [0, 0, vb[0], vb[1]];
        const pad = Math.max(bb[2] - bb[0], bb[3] - bb[1]) * 0.05 + 2, w = bb[2] - bb[0] + 2 * pad, h = bb[3] - bb[1] + 2 * pad;
        viewBox = (bb[0] - pad).toFixed(1) + ' ' + (bb[1] - pad).toFixed(1) + ' ' + w.toFixed(1) + ' ' + h.toFixed(1);
        labelFont = +(w / 26).toFixed(2); fontSize = +(w / 200).toFixed(3);
        gu.districts.forEach((d) => { const dc = distC(gIdx, d.sgIndex); dc.dongs.forEach((dn) => { if (dn.geo) regions.push({ key: dn.key, gid: 'sg' + d.sgIndex, path: dn.geo.d, result: dc, fillRes: dn, tipName: dc.sggName }); }); });
        labels = gu.districts.map((d) => { const dc = distC(gIdx, d.sgIndex); return dc.geo ? { cx: dc.geo.cx, cy: dc.geo.cy, text: shortDist(dc.sggName, gu.name) } : null; }).filter(Boolean);
        selectedGid = contest && contest.level === 'gwdist' ? 'sg' + contest.sgIndex : null;
        caption = (singleGu ? G.name : gu.name) + ' · 읍·면·동별 1위 · 채도 = 격차 · 클릭하면 선거구별 개표로';
        const ps = new Set(); gu.districts.forEach((d) => distC(gIdx, d.sgIndex).dongs.forEach((dn) => { if (dn.geo) ps.add(dn.winnerPartyId); })); legendParties = [...ps];
        list = { title: '선거구', items: gu.districts.map((d) => { const dc = distC(gIdx, d.sgIndex); return { key: 'sg' + d.sgIndex, gid: 'sg' + d.sgIndex, label: shortDist(dc.sggName, gu.name), pid: dc.winnerPartyId, share: dc.candidates[0].share, on: () => goDist(gIdx, d.sgIndex) }; }) };
      } else {
        const dc = distC(nav.guIdx, nav.sgIdx);
        const bb = dc.geo ? dc.geo.bbox : (guC(nav.guIdx).geo ? guC(nav.guIdx).geo.bbox : [0, 0, vb[0], vb[1]]);
        const pad = Math.max(bb[2] - bb[0], bb[3] - bb[1]) * 0.06 + 2, w = bb[2] - bb[0] + 2 * pad, h = bb[3] - bb[1] + 2 * pad;
        viewBox = (bb[0] - pad).toFixed(1) + ' ' + (bb[1] - pad).toFixed(1) + ' ' + w.toFixed(1) + ' ' + h.toFixed(1);
        labelFont = +(w / 22).toFixed(2); fontSize = +(w / 180).toFixed(3);
        dc.dongs.forEach((dn) => { if (dn.geo) regions.push({ key: dn.key, gid: dn.key, path: dn.geo.d, result: dn, tipName: dn.dongName }); });
        labels = dc.dongs.filter((dn) => dn.geo).map((dn) => ({ cx: dn.geo.cx, cy: dn.geo.cy, text: dn.dongName }));
        selectedGid = contest && contest.level === 'gwdong' ? contest.key : null;
        caption = guC(nav.guIdx).name + ' ' + dc.sggName + ' · 읍·면·동별 1위 · 채도 = 격차';
        const ps = new Set(); dc.dongs.forEach((dn) => ps.add(dn.winnerPartyId)); legendParties = [...ps];
        list = { title: '읍·면·동', items: dc.dongs.map((dn) => ({ key: dn.key, gid: dn.key, label: dn.dongName, pid: dn.winnerPartyId, share: dn.candidates[0].share, on: () => selectDong(dn.key) })).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      }
    } else {
      if (nav.level === 'seoul' && !singleGu) {
        G.guList.forEach((gu) => { if (!gu.propKey) return; propC(gu.guIndex).dongs.forEach((dn) => { if (dn.geo) regions.push({ key: dn.key, gid: 'gu' + gu.guIndex, path: dn.geo.d, result: dn, tipName: gu.name + ' ' + dn.dongName }); }); });
        labels = G.guList.filter((gu) => gu.geo).map((gu) => ({ cx: gu.geo.cx, cy: gu.geo.cy, text: gu.name }));
        selectedGid = contest && contest.guIndex != null ? 'gu' + contest.guIndex : null;
        caption = G.name + ' 광역의원 비례대표 — 읍·면·동별 1위 정당 · 자치구를 클릭하면 동별 개표로';
        const ps = new Set(); G.guList.forEach((gu) => { if (gu.propKey) propC(gu.guIndex).dongs.forEach((dn) => ps.add(dn.winnerPartyId)); }); legendParties = [...ps];
        list = { title: '자치구', items: G.guList.filter((gu) => gu.propKey).map((gu) => { const pc = propC(gu.guIndex); return { key: 'gu' + gu.guIndex, gid: 'gu' + gu.guIndex, label: gu.name, pid: pc.winnerPartyId, share: pc.candidates[0].share, on: () => goGu(gu.guIndex) }; }).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      } else {
        const gIdx = singleGu ? 0 : nav.guIdx;
        const gu = guC(gIdx); const pc = propC(gIdx);
        const bb = gu.geo ? gu.geo.bbox : [0, 0, vb[0], vb[1]];
        const pad = Math.max(bb[2] - bb[0], bb[3] - bb[1]) * 0.05 + 2, w = bb[2] - bb[0] + 2 * pad, h = bb[3] - bb[1] + 2 * pad;
        viewBox = (bb[0] - pad).toFixed(1) + ' ' + (bb[1] - pad).toFixed(1) + ' ' + w.toFixed(1) + ' ' + h.toFixed(1);
        labelFont = +(w / 24).toFixed(2); fontSize = +(w / 200).toFixed(3);
        pc.dongs.forEach((dn) => { if (dn.geo) regions.push({ key: dn.key, gid: dn.key, path: dn.geo.d, result: dn, tipName: dn.dongName }); });
        labels = pc.dongs.filter((dn) => dn.geo).map((dn) => ({ cx: dn.geo.cx, cy: dn.geo.cy, text: dn.dongName }));
        selectedGid = contest && contest.level === 'gwpropdong' ? contest.key : null;
        caption = gu.name + ' 비례대표 · 읍·면·동별 1위 정당 · 채도 = 격차';
        const ps = new Set(); pc.dongs.forEach((dn) => ps.add(dn.winnerPartyId)); legendParties = [...ps];
        list = { title: '읍·면·동', items: pc.dongs.map((dn) => ({ key: dn.key, gid: dn.key, label: dn.dongName, pid: dn.winnerPartyId, share: dn.candidates[0].share, on: () => selectDong(dn.key) })).sort((a, b) => a.label.localeCompare(b.label, 'ko')) };
      }
    }

    const onSelect = (r) => {
      if (nav.level === 'seoul' && !singleGu) goGu(+r.gid.slice(2));
      else if (layer === 'dist' && (nav.level === 'gu' || (nav.level === 'seoul' && singleGu))) goDist(singleGu ? 0 : nav.guIdx, +r.gid.slice(2));
      else selectDong(r.key);
    };

    let back = null, backLabel = '';
    if (contest) {
      if (contest.level === 'gwdong') { back = () => goDist(contest.guIndex, contest.sgIndex); backLabel = shortDist(distC(contest.guIndex, contest.sgIndex).sggName, guC(contest.guIndex).name); }
      else if (contest.level === 'gwdist') { back = () => goGu(contest.guIndex); backLabel = guC(contest.guIndex).name; }
      else if (contest.level === 'gwpropdong') { back = () => goGu(contest.guIndex); backLabel = guC(contest.guIndex).name + ' 비례'; }
      else if (contest.level === 'gwprop') { back = goSeoul; backLabel = sidoShort(G.name) + ' 비례'; }
    }

    const curGu = nav.guIdx != null ? guC(nav.guIdx) : (contest && contest.guIndex != null ? guC(contest.guIndex) : null);
    const curDist = (layer === 'dist' && nav.level === 'dist') ? distC(nav.guIdx, nav.sgIdx) : (contest && (contest.level === 'gwdist' || contest.level === 'gwdong') ? distC(contest.guIndex, contest.sgIndex) : null);
    const dongSel = contest && (contest.level === 'gwdong' || contest.level === 'gwpropdong') ? contest : null;
    const guIsCur = curGu && !curDist && !dongSel;

    let rightPanel;
    if (contest) rightPanel = <Detail contest={contest} highlightName={sel.highlight} onBack={back} backLabel={backLabel} hint={contest.level === 'gwdist' ? ((contest.seats > 1 ? '중선거구 — ' + contest.seats + '명을 뽑는 선거구라 상위 ' + contest.seats + '명이 모두 당선됐어요. ' : '') + '지도에서 읍·면·동을 클릭하면 동별 개표를 볼 수 있어요.') : contest.level === 'gwprop' ? '지도에서 읍·면·동을 클릭하면 동별 비례 득표를 볼 수 있어요.' : null} />;
    else if (layer === 'dist' && nav.level === 'gu' && !singleGu) rightPanel = <GwangGuSummary G={G} gi={nav.guIdx} onDist={goDist} onBack={goSeoul} />;
    else if (layer === 'prop') rightPanel = <GwangPropSummary G={G} />;
    else rightPanel = <GwangSummary G={G} />;


    return <>
      <SearchBar onPick={onPick} index={G.searchIndex} placeholder={'시의원 후보 · 자치구 · 선거구 · 읍·면·동 검색  (' + sidoShort(G.name) + ')'} />
      {SIDOS.length > 1 &&
        <div className="sido-pills">
          {SIDOS.map((code) => { const d = DATA.gwang.sido[code]; return <button key={code} className={code === sidoCode ? 'is-on' : ''} onClick={() => switchSido(code)}>{sidoShort(d.name)}</button>; })}
        </div>}
      <div className="layer-toggle">
        <button className={layer === 'dist' ? 'is-on' : ''} onClick={() => reset('dist')}>지역구 의원 <span className="rt">{G.summary.totalSeats}석</span></button>
        <button className={layer === 'prop' ? 'is-on' : ''} onClick={() => reset('prop')}>비례대표 <span className="rt">{G.summary.propSeatTotal}석</span></button>
      </div>
      <div className="grid">
        <div className="card">
          <div className="crumbs">
            <button onClick={goSeoul}>{G.name} 광역의회</button>
            {curGu && !singleGu && <><span className="sep">›</span>{guIsCur ? <span className="cur">{curGu.name}{layer === 'prop' ? ' 비례' : ''}</span> : <button onClick={() => goGu(curGu.guIndex)}>{curGu.name}{layer === 'prop' ? ' 비례' : ''}</button>}</>}
            {layer === 'dist' && curDist && <><span className="sep">›</span>{nav.level === 'dist' && !dongSel ? <span className="cur">{shortDist(curDist.sggName, curGu.name)}</span> : <button onClick={() => goDist(curDist.guIndex, curDist.sgIndex)}>{shortDist(curDist.sggName, curGu.name)}</button>}</>}
            {dongSel && <><span className="sep">›</span><span className="cur">{dongSel.dongName}</span></>}
          </div>
          <RegionMap regions={regions} labels={labels} viewBox={viewBox} onSelect={onSelect}
            selectedGid={selectedGid} fontSize={fontSize} labelFont={labelFont} flat={false} label={caption} list={list} />
          <Legend parties={legendParties} />
        </div>
        <div className="card">{rightPanel}</div>
      </div>
      <div className="footer">
        <b>데이터</b> — 중앙선관위 <b>시·도의회의원(광역의원) 선거 읍·면·동별 개표 엑셀</b>을 그대로 집계했습니다. 자치구 → 지역구 선거구 → 읍·면·동까지 실제 수치이며, 각 자치구의 <b>비례대표 정당 득표</b>도 함께 반영했습니다.<br />
        <b>지역구</b>는 선거구마다 1명을 뽑는 소선거구제, <b>비례대표</b>는 정당 명부 투표입니다. 현재 <b>{G.name}</b> 기준 지역구 {G.summary.totalSeats}석 + 비례 {G.summary.propSeatTotal}석 = 총 {G.summary.grandTotal}석. 사전투표(관내·관외·거소)와 본투표(선거일)를 후보별로 비교할 수 있습니다.<br />
        행정구역 경계: 행정안전부 행정동 경계 2026.04.01 기준. 적재된 시·도: <b>{SIDOS.map((c) => sidoShort(DATA.gwang.sido[c].name)).join(' · ')}</b> (전국 확대 예정).
      </div>
    </>;
  }

  /* ====================== 모드 전환 래퍼 ====================== */
  function App() {
    const [mode, setMode] = useState('gov');
    const hasGuk = !!DATA.guk;
    const hasEdu = !!DATA.edu;
    const hasNa = !!DATA.na;
    const hasGwang = !!DATA.gwang;

    mode === 'gwang' ? '시·도 → 자치구 → 선거구 → 읍·면·동 (지역구·비례)' :
    mode === 'edu' ? '교육감 성향 → 자치구 → 읍·면·동' :
    mode === 'na' ? '재·보권 선거구 → 읍·면·동' :
    '전국 선거구 → 읍·면·동';
    return (
      <div className="wrap">
      <div className="top">
        <div className="brand">
          <h1>2026 지방선거 개표 지도</h1>

        </div>

        <div className="mode-toggle" role="tablist">
          <button className={mode === 'gov' ? 'is-on' : ''} onClick={() => setMode('gov')}>시·도지사</button>
          {hasGwang && <button className={mode === 'gwang' ? 'is-on' : ''} onClick={() => setMode('gwang')}>광역의원 <span className="mt-tag">{DATA.gwang.order.length}시·도</span></button>}
          <button className={mode === 'guhead' ? 'is-on' : ''} onClick={() => setMode('guhead')}>시·군·구의장 <span className="mt-tag">전국</span></button>
          {hasEdu && <button className={mode === 'edu' ? 'is-on' : ''} onClick={() => setMode('edu')}>교육감 <span className="mt-tag">전국</span></button>}
          {hasNa && <button className={mode === 'na' ? 'is-on' : ''} onClick={() => setMode('na')}>국회의원 재·보궐 <span className="mt-tag">14곳</span></button>}
        </div>
        }
      {mode === 'gov' ? <GovExplorer /> : mode === 'gwang' ? <GwangExplorer /> : mode === 'edu' ? <EduExplorer /> : mode === 'na' ? <NaExplorer /> : <GukExplorer />}
    </div>);

  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
