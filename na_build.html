<!doctype html><html><head><meta charset="utf-8"><title>na build</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head><body><pre id="log">building...</pre>
<script>
/* [sidoCode, sidoName, districtName, filename] */
const DISTRICTS = [
  ['41','경기도','안산시갑','국회의원선거_경기도_안산시갑.xlsx'],
  ['41','경기도','평택시을','국회의원선거_경기도_평택시을.xlsx'],
  ['41','경기도','하남시갑','국회의원선거_경기도_하남시갑.xlsx'],
  ['49','광주광역시','광산구을','국회의원선거_광주_광산구을.xlsx'],
  ['27','대구광역시','달성군','국회의원선거_대구_달성군.xlsx'],
  ['26','부산광역시','북구갑','국회의원선거_부산_북구갑.xlsx'],
  ['31','울산광역시','남구갑','국회의원선거_울산_남구갑.xlsx'],
  ['28','인천광역시','계양구을','국회의원선거_인천_계양구을.xlsx'],
  ['28','인천광역시','연수구갑','국회의원선거_인천_연수구갑.xlsx'],
  ['52','전북특별자치도','군산시김제시부안군갑','국회의원선거_전북_군산시김제시부안군갑.xlsx'],
  ['52','전북특별자치도','군산시김제시부안군을','국회의원선거_전북_군산시김제시부안군을.xlsx'],
  ['50','제주특별자치도','서귀포시','국회의원선거_제주_서귀포시.xlsx'],
  ['44','충청남도','공주시부여군청양군','국회의원선거_충남_공주시부여군청양군.xlsx'],
  ['44','충청남도','아산시을','국회의원선거_충남_아산시을.xlsx'],
];
const SIDO_NAME = { '26':'부산광역시','27':'대구광역시','28':'인천광역시','31':'울산광역시','41':'경기도','44':'충청남도','49':'광주광역시','50':'제주특별자치도','52':'전북특별자치도' };

/* parser.html 과 동일한 행 구조: 합계 / 거소·관외사전 / 동별 계·관내사전·선거일 */
function parseSheet(rows){
  const hdr = rows[1]||[]; const candCols=[]; const cands=[];
  for(let c=4;c<hdr.length;c++){ const v=hdr[c];
    if(v==null){ if(candCols.length) break; else continue; }
    if(String(v).trim()==='계') break;
    const parts=String(v).split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    candCols.push(c); cands.push({party:parts[0], name:parts.slice(1).join(' ')||parts[0]});
  }
  const nc=candCols.length; const gv=r=>candCols.map(c=>+(r[c]||0));
  let sgElect=0,sgVoters=0; const prx=new Array(nc).fill(0);
  const dm=new Map(), order=[];
  for(let i=2;i<rows.length;i++){ const r=rows[i]; if(!r) continue;
    const a=(r[0]==null?'':String(r[0]).trim()), b=(r[1]==null?'':String(r[1]).trim());
    if(a===''&&b==='') continue;
    if(b===''){ if(a==='합계'){sgElect=+(r[2]||0);sgVoters=+(r[3]||0);} else { const v=gv(r); for(let k=0;k<nc;k++) prx[k]+=v[k]; } continue; }
    if(!dm.has(a)){ dm.set(a,{name:a}); order.push(a); }
    const D=dm.get(a);
    if(b==='계'||b==='소계'){ D.electorate=+(r[2]||0); D.voters=+(r[3]||0); D.votes=gv(r); }
    else if(b.indexOf('관내사전')===0){ D.pre=gv(r); }
    else if(b.indexOf('선거일')===0){ D.day=gv(r); }
  }
  const dongs=order.map(nm=>{ const D=dm.get(nm); return { name:nm, electorate:D.electorate||0, voters:D.voters||0,
    votes:D.votes||new Array(nc).fill(0), pre:D.pre||new Array(nc).fill(0), day:D.day||new Array(nc).fill(0) }; });
  return { cands, prx, sgElect, sgVoters, dongs };
}

async function buildDistrict(d){
  const url = 'uploads/'+d[3].normalize('NFD');
  const res = await fetch(url); if(!res.ok) throw new Error(d[3]+' HTTP '+res.status);
  const buf = await res.arrayBuffer(); const wb = XLSX.read(buf,{type:'array'});
  let cands=null; const prx=[]; let elect=0, voters=0; const sgg=[]; const dongs=[];
  wb.SheetNames.forEach(sn=>{
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null});
    const p = parseSheet(rows);
    if(!p.cands.length) return;
    if(!cands){ cands = p.cands.map(c=>({party:c.party,name:c.name})); for(let k=0;k<cands.length;k++) prx[k]=0; }
    const sggName = String(sn).trim();
    sgg.push(sggName);
    elect += p.sgElect; voters += p.sgVoters;
    for(let k=0;k<cands.length;k++) prx[k]+=p.prx[k]||0;
    p.dongs.forEach(dn=>{
      dongs.push({ name:dn.name, sgg:sggName, electorate:dn.electorate, voters:dn.voters,
        cands: cands.map((c,k)=>({party:c.party,name:c.name,votes:dn.votes[k]||0})),
        pre:dn.pre, day:dn.day });
    });
  });
  // 선거구 후보 총득표 = 동별합 + 거소·관외사전(prx)
  const distCands = cands.map((c,k)=>({party:c.party,name:c.name,
    votes: dongs.reduce((s,dn)=>s+dn.cands[k].votes,0) + (prx[k]||0)}));
  return { name:d[2], sgg, electorate:elect, voters, cands:distCands, prx, dongs };
}

async function run(){
  const bySido = {};
  const diag = [];
  for(const d of DISTRICTS){
    const dist = await buildDistrict(d);
    if(!dist.dongs.length){ diag.push('⚠ '+d[2]+' — 빈 파일(데이터 없음) → 제외'); continue; }
    if(!bySido[d[0]]) bySido[d[0]] = { id:d[0], name:SIDO_NAME[d[0]], districts:[] };
    bySido[d[0]].districts.push(dist);
    diag.push(d[2]+' · 자치구['+dist.sgg.join(',')+'] · 동'+dist.dongs.length+' · 후보'+dist.cands.length+' ('+dist.cands.map(c=>c.party+' '+c.name+' '+c.votes).join(' / ')+')');
    document.getElementById('log').textContent='built '+d[2];
  }
  // compact: VOTES_NA_C[code] = [sidoName, [ [name,sggArr,elect,voters,candMeta,prx, [ [dongName,dongSgg,elect,voters,votesArr,preArr,dayArr],... ] ], ... ] ]
  const C = {};
  Object.keys(bySido).sort((a,b)=>+a-+b).forEach(code=>{
    const s = bySido[code];
    const districts = s.districts.map(dist=>{
      const candMeta = dist.cands.map(c=>[c.party,c.name]);
      const dongs = dist.dongs.map(dn=>[ dn.name, dn.sgg, dn.electorate, dn.voters, dn.cands.map(c=>c.votes), dn.pre, dn.day ]);
      return [ dist.name, dist.sgg, dist.electorate, dist.voters, candMeta, dist.prx, dongs ];
    });
    C[code] = [ s.name, districts ];
  });
  const str = 'window.VOTES_NA_C='+JSON.stringify(C)+';';
  window.__NASTR = str;
  window.__NAB64 = btoa(unescape(encodeURIComponent(str)));
  window.__DIAG = diag.join('\n');
  document.getElementById('log').textContent = 'DONE — compact '+str.length+' bytes, b64 '+window.__NAB64.length+'\n\n'+diag.join('\n');
}
run().catch(e=>{ window.__ERR=String(e&&e.stack||e); document.getElementById('log').textContent='ERR '+(e&&e.stack||e); });
</script></body></html>
